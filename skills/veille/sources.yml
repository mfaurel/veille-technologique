 # ── Santé ──────────────────────────────────────────────────

  - name: Agence du Numérique en Santé
    url: https://esante.gouv.fr/rss.xml
    site: https://esante.gouv.fr
    description: ANS - actualités numérique en santé, interopérabilité, HDS
    category_override: santé-numérique/ANS
    limit: 5
    max_items: 5
    max_age_hours: 72

 # ── Anglais ──────────────────────────────────────────────────

  - name: MIT Technology Review IA
    url: https://www.technologyreview.com/topic/artificial-intelligence/feed
    site: https://www.technologyreview.com
    description: Analyses IA du MIT Technology Review
    category_override: IA/général
    limit: 1
    max_items: 5
    max_age_hours: 72

  - name: Hacker News
    url: https://www.daemonology.net/hn-daily/index.rss
    site: https://news.ycombinator.com
    description: Top 5 stories per day from Hacker News Daily
    parser: hn-daily
    limit: 5
    max_items: 5
    max_age_hours: 72

  - name: Lobste.rs
    url: https://lobste.rs/rss
    site: https://lobste.rs
    description: Curated tech links voted on by the community
    limit: 5

  - name: TechCrunch (alt)
    url: https://feeds.feedburner.com/TechCrunch/
    site: https://techcrunch.com
    description: Version feedburner (plus stable)
    category_override: IT/général
    limit: 5
    max_items: 5
    max_age_hours: 72

  - name: DEV Community
    url: https://dev.to/feed
    site: https://dev.to
    description: Articles de développeurs, retours d'expérience et tutoriels
    category_override: dev/general
    limit: 5
    max_items: 5
    max_age_hours: 72

  - name: Open Source Initiative
    url: https://opensource.org/feed
    site: https://opensource.org
    description: Actualités et références autour de l'open source
    category_override: open-source/general
    limit: 5
    max_items: 5
    max_age_hours: 72

  - name: The Hacker News
    url: https://feeds.feedburner.com/TheHackersNews
    site: https://thehackernews.com
    description: Actualités cybersécurité et vulnérabilités
    category_override: sécurité/cyber
    limit: 5
    max_items: 5
    max_age_hours: 72

 # ── Sécurité ──────────────────────────────────────────────────

  - name: CERT-FR Alertes
    url: https://www.cert.ssi.gouv.fr/alerte/feed/
    site: https://www.cert.ssi.gouv.fr
    description: Alertes de sécurité ANSSI - vulnérabilités critiques
    category_override: sécurité/CERT-FR
    limit: 5
    max_items: 5
    max_age_hours: 72

  - name: CERT-FR Avis
    url: https://www.cert.ssi.gouv.fr/avis/feed/
    site: https://www.cert.ssi.gouv.fr
    description: Avis de sécurité ANSSI - mises à jour recommandées
    category_override: sécurité/CERT-FR
    limit: 5
    max_items: 5
    max_age_hours: 72

  - name: NVD Recent CVEs
    url: https://cvefeed.io/rssfeed/severity/high.xml
    site: https://cvefeed.io
    description: CVE récentes (NVD a retiré ses flux RSS, alternative cvefeed.io)
    category_override: sécurité/cve
    limit: 5
    max_items: 5
    max_age_hours: 72
