# Sources RSS pour la veille technologique
# Ajouter une source : copier un bloc ci-dessous avec name + url [+ category_override]
 

sources:

 # ── Généraliste francophone ──────────────────────────────────────────────────
  - name: Journal du Hacker
    url: https://www.journalduhacker.net/rss
    site: https://www.journalduhacker.net
    description: Agrégateur communautaire de news tech francophones
    limit: 5

  - name: Silicon.fr
    url: https://www.silicon.fr/feed
    site: https://www.silicon.fr
    description: IT et digital pour les décideurs - cloud, DevOps, IA
    category_override: IT/décideurs
    limit: 5

  - name: Le Monde Informatique
    url: https://www.lemondeinformatique.fr/flux-rss/thematique/toutes-les-actualites/rss.xml
    site: https://www.lemondeinformatique.fr
    description: Actualités IT professionnelles - infrastructure, sécurité, cloud
    category_override: IT/décideurs
    limit: 5

 # ── Forge ──────────────────────────────────────────────────
  - name: Jenkins Blog
    url: https://feeds.feedburner.com/ContinuousBlog/
