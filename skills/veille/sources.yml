 # ── Sécurité ──────────────────────────────────────────────────

  - name: CERT-FR Alertes
    url: https://www.cert.ssi.gouv.fr/alerte/feed/
    site: https://www.cert.ssi.gouv.fr
    description: Alertes de sécurité ANSSI - vulnérabilités critiques
    category_override: sécurité/CERT-FR
    limit: 5

  - name: CERT-FR Avis
    url: https://www.cert.ssi.gouv.fr/avis/feed/
    site: https://www.cert.ssi.gouv.fr
    description: Avis de sécurité ANSSI - mises à jour recommandées
    category_override: sécurité/CERT-FR
    limit: 5

  - name: CISA Alerts
    url: https://www.cisa.gov/news.xml
    site: https://www.cisa.gov
    description: Alertes cybersécurité et communications CISA
    category_override: sécurité/cyber
    limit: 5

  - name: NVD Recent CVEs
    url: https://cvefeed.io/rssfeed/latest.xml
    site: https://cvefeed.io
    description: CVE récentes (NVD a retiré ses flux RSS, alternative cvefeed.io)
    category_override: sécurité/cve
    limit: 5

 # ── Santé ──────────────────────────────────────────────────

  - name: Agence du Numérique en Santé
    url: https://esante.gouv.fr/rss.xml
    site: https://esante.gouv.fr
